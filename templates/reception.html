<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leo Marquard Reception</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1014;
      --panel: #111922;
      --panel-2: #172230;
      --line: #263442;
      --text: #edf4f7;
      --muted: #91a3ad;
      --gold: #d6ad5b;
      --teal: #5fd0bd;
      --danger: #ff6b6b;
      --ok: #7bd88f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; font-family: Inter, Segoe UI, system-ui, sans-serif; background: var(--bg); color: var(--text); }
    header, main { width: min(1260px, calc(100% - 32px)); margin: 0 auto; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: center; padding: 26px 0 16px; }
    h1 { margin: 0; font-size: clamp(26px, 4vw, 42px); letter-spacing: 0; }
    .subtitle { color: var(--muted); margin-top: 5px; }
    .stats { display: grid; grid-template-columns: repeat(6, minmax(110px, 1fr)); gap: 10px; margin-bottom: 16px; }
    .stat, .panel, .booking, .machine { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; }
    .stat { padding: 14px; }
    .stat strong { display: block; font-size: 28px; color: var(--gold); }
    .stat span { color: var(--muted); font-size: 13px; }
    .layout { display: grid; grid-template-columns: 1fr 360px; gap: 16px; padding-bottom: 34px; }
    .panel { padding: 18px; }
    .toolbar { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 14px; }
    input, button, textarea {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0d141c;
      color: var(--text);
      min-height: 40px;
      padding: 0 11px;
    }
    button { cursor: pointer; font-weight: 800; }
    button.primary { background: var(--gold); border-color: var(--gold); color: #171106; }
    button.secondary { background: var(--panel-2); }
    button.danger { background: #3a1518; border-color: #743138; color: #ffd1d1; }
    .booking-list, .machine-list { display: grid; gap: 10px; }
    .booking { display: grid; grid-template-columns: 1fr auto; gap: 12px; padding: 14px; }
    .muted { color: var(--muted); }
    .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: end; }
    .pill { display: inline-flex; align-items: center; min-height: 24px; border-radius: 999px; padding: 0 9px; background: var(--teal); color: #071412; font-size: 12px; font-weight: 900; }
    .pill.confirmed { background: var(--gold); color: #171106; }
    .pill.completed { background: var(--ok); }
    .pill.abandoned, .pill.off, .pill.late { background: var(--danger); color: #260a0a; }
    .machine { padding: 12px; display: grid; gap: 10px; }
    .machine-top { display: flex; justify-content: space-between; gap: 10px; }
    textarea { width: 100%; padding-top: 9px; min-height: 68px; resize: vertical; }
    @media (max-width: 960px) {
      .layout, .stats { grid-template-columns: 1fr; }
      .booking { grid-template-columns: 1fr; }
      .actions { justify-content: start; }
    }
  </style>
</head>
<body data-page="reception">
  <header>
    <div>
      <h1>Reception Dashboard</h1>
      <div class="subtitle">Leo Marquard laundry bookings, check-ins, returns, and machines.</div>
    </div>
    <button class="secondary" id="refreshReception">Refresh</button>
  </header>

  <main>
    <section class="stats">
      <div class="stat"><strong id="statTotal">0</strong><span>Total</span></div>
      <div class="stat"><strong id="statConfirmed">0</strong><span>Waiting</span></div>
      <div class="stat"><strong id="statCheckedIn">0</strong><span>Checked In</span></div>
      <div class="stat"><strong id="statCompleted">0</strong><span>Completed</span></div>
      <div class="stat"><strong id="statAbandoned">0</strong><span>Abandoned</span></div>
      <div class="stat"><strong id="statLate">0</strong><span>Late</span></div>
    </section>

    <section class="layout">
      <div class="panel">
        <div class="toolbar">
          <h2>Today</h2>
          <input id="bookingSearch" placeholder="Search bookings">
        </div>
        <div class="booking-list" id="receptionBookings"></div>
      </div>

      <aside class="panel">
        <h2>Machines</h2>
        <div class="machine-list" id="receptionMachines"></div>
      </aside>
    </section>
  </main>
</body>
</html>
