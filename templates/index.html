<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Leo Marquard Laundry · UCT Booking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #060a12;
      font-family: 'Syne', sans-serif;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    /* toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      padding: 0.75rem 1.6rem;
      border-radius: 3rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      backdrop-filter: blur(16px);
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.success { background: rgba(0, 229, 176, 0.18); border: 1px solid #00e5b0; color: #00e5b0; }
    #toast.error { background: rgba(255, 94, 108, 0.15); border: 1px solid #ff5e6c; color: #ff5e6c; }
    #toast.info { background: rgba(100, 150, 255, 0.15); border: 1px solid #6496ff; color: #6496ff; }

    .app-container {
      max-width: 1400px;
      width: 100%;
      background: rgba(10, 15, 26, 0.6);
      backdrop-filter: blur(24px);
      border-radius: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 2rem;
    }

    /* header */
    .system-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
      border-bottom: 1px solid rgba(0, 229, 176, 0.15);
      padding-bottom: 1.2rem;
    }
    .title-section h1 {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff 30%, #00e5b0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .title-section p {
      color: #7a8aaa;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 2px;
      margin-top: 5px;
    }
    .status-badge {
      background: rgba(0, 229, 176, 0.15);
      padding: 0.45rem 1.1rem;
      border-radius: 40px;
      border: 1px solid rgba(0, 229, 176, 0.4);
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: #00e5b0;
    }
    .status-dot {
      display: inline-block;
      width: 6px; height: 6px;
      background: #00e5b0;
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    .booking-panel { display: flex; flex-wrap: wrap; gap: 1.8rem; }
    .form-section { flex: 1.2; min-width: 280px; }
    .slots-section { flex: 2.2; min-width: 320px; }

    .glass-card {
      background: rgba(14, 20, 34, 0.7);
      backdrop-filter: blur(16px);
      border-radius: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 1.6rem;
    }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 2px;
      color: #7a8aaa;
      text-transform: uppercase;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .card-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.08);
    }

    .input-field { margin-bottom: 1.2rem; }
    .input-field label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      color: #a0b4d0;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .input-field input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.4rem;
      padding: 0.8rem 1.1rem;
      color: #eef2ff;
      font-size: 0.9rem;
      font-family: 'Syne', sans-serif;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-field input:focus { border-color: #00e5b0; box-shadow: 0 0 0 3px rgba(0, 229, 176, 0.35); }
    .input-field input.invalid { border-color: #ff5e6c; box-shadow: 0 0 0 3px rgba(255, 94, 108, 0.2); }

    .dropdown-field { margin-bottom: 1.2rem; }
    .dropdown-label {
      display: block;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      color: #a0b4d0;
      margin-bottom: 6px;
      text-transform: uppercase;
    }
    .dropdown-trigger {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.4rem;
      padding: 0.8rem 1.1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: transform 0.05s, border-color 0.2s;
      color: #eef2ff;
      font-family: 'Syne', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
    }
    .dropdown-trigger:active { transform: scale(0.98); }
    .dropdown-trigger.loading { opacity: 0.7; pointer-events: none; }
    .dropdown-trigger.loading .dropdown-arrow { animation: spin 0.8s linear infinite; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    .dropdown-arrow { color: #00e5b0; font-size: 1rem; transition: transform 0.2s; }
    .dropdown-trigger.open .dropdown-arrow { transform: rotate(180deg); }

    .global-overlay {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(6px);
      z-index: 90;
      opacity: 0; visibility: hidden;
      transition: opacity 0.2s, visibility 0.2s;
    }
    .global-overlay.active { opacity: 1; visibility: visible; }

    .dropdown-menu {
      position: fixed;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
      background: rgba(12, 18, 32, 0.97);
      backdrop-filter: blur(24px);
      border-radius: 1.5rem;
      border: 1px solid rgba(0, 229, 176, 0.4);
      z-index: 200;
      overflow: hidden;
      animation: menuIn 0.2s ease-out;
    }
    @keyframes menuIn {
      from { opacity: 0; transform: translate(-50%, -46%) scale(0.95); }
      to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    .dropdown-option {
      padding: 0.85rem 1.4rem;
      color: #eef2ff;
      font-family: 'Syne', sans-serif;
      font-weight: 500;
      border-bottom: 1px solid rgba(255, 255, 255, 0.04);
      cursor: pointer;
      transition: background 0.15s, padding-left 0.15s;
    }
    .dropdown-option:active { background: #00e5b0; color: #021812; }
    .dropdown-option:last-child { border-bottom: none; }
    .dropdown-option:hover {
      background: rgba(0, 229, 176, 0.15);
      padding-left: 1.8rem;
      color: #00e5b0;
    }

    /* selection card */
    .selection-card {
      background: rgba(0, 0, 0, 0.4);
      border-radius: 1.2rem;
      margin-top: 1.5rem;
      border: 1px solid rgba(255, 255, 255, 0.08);
      overflow: hidden;
    }
    .selection-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.8rem 1rem;
      background: rgba(0, 229, 176, 0.08);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 1.5px;
      color: #7a8aaa;
    }
    .selection-reset { cursor: pointer; transition: color 0.2s; }
    .selection-reset:hover { color: #ff5e6c; }
    .selection-content { padding: 1rem; }
    .selection-empty { text-align: center; padding: 1rem; color: #7a8aaa; }
    .selection-empty .empty-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
    .selection-item {
      display: flex;
      justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.08);
    }
    .selection-label { font-size: 0.7rem; color: #7a8aaa; font-family: 'DM Mono', monospace; }
    .selection-value { font-size: 0.85rem; font-weight: 600; color: #00e5b0; }
    .selection-booking-id {
      background: rgba(0, 229, 176, 0.15);
      border-radius: 0.8rem;
      padding: 0.5rem 0.8rem;
      text-align: center;
      margin-top: 0.8rem;
      font-size: 0.7rem;
      color: #00e5b0;
    }

    /* slots */
    .slot-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.2rem;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .slot-header-title {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 2px;
      color: #7a8aaa;
      text-transform: uppercase;
    }
    .date-input-wrap input {
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 2rem;
      padding: 0.45rem 1rem;
      color: #eef2ff;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      cursor: pointer;
    }
    .slots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 0.8rem;
      min-height: 100px;
    }
    .slot-skeleton {
      border-radius: 1rem;
      height: 65px;
      background: linear-gradient(90deg, rgba(255,255,255,0.04) 25%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }
    @keyframes shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .slot-node {
      border-radius: 1rem;
      padding: 0.85rem 0.4rem;
      text-align: center;
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      font-size: 0.78rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
      animation: fadeIn 0.3s ease both;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .slot-node.available {
      background: rgba(0, 80, 60, 0.5);
      border: 1px solid rgba(62, 255, 160, 0.35);
      color: #c8ffe0;
    }
    .slot-node.available:hover {
      transform: translateY(-2px);
      background: rgba(0, 120, 85, 0.6);
      border-color: #3effa0;
      box-shadow: 0 6px 20px rgba(0, 255, 140, 0.2);
    }
    .slot-node.unavailable {
      background: rgba(80, 20, 30, 0.5);
      border: 1px solid rgba(255, 100, 100, 0.25);
      color: #ff9090;
      cursor: not-allowed;
      opacity: 0.55;
    }
    .slot-node.selected-slot {
      background: #00e5b0 !important;
      border-color: white !important;
      color: #021812 !important;
      font-weight: 700;
      box-shadow: 0 0 18px rgba(0, 229, 176, 0.5);
      transform: translateY(-2px) scale(1.03);
    }

    .btn-book {
      background: linear-gradient(100deg, #00d4a8, #00916e);
      border: none;
      width: 100%;
      padding: 1rem;
      border-radius: 2rem;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: #010e0a;
      margin-top: 1.5rem;
      cursor: pointer;
      transition: transform 0.15s ease;
      box-shadow: 0 6px 20px rgba(0, 200, 150, 0.3);
    }
    .btn-book:hover { transform: translateY(-1px); box-shadow: 0 10px 28px rgba(0, 200, 150, 0.4); }
    .btn-book:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .btn-book.loading { opacity: 0.7; cursor: wait; }

    .legend {
      display: flex;
      gap: 1.2rem;
      margin-top: 1rem;
      justify-content: center;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      color: #7a8aaa;
    }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    .legend-dot.avail { background: #3effa0; }
    .legend-dot.taken { background: #ff5e6c; }
    .legend-dot.sel { background: #00e5b0; }

    .machine-banner {
      background: rgba(255, 94, 108, 0.12);
      border: 1px solid rgba(255, 94, 108, 0.4);
      border-radius: 1.4rem;
      padding: 0.7rem 1rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: #ff5e6c;
      margin-bottom: 0.8rem;
      text-align: center;
    }

    .btn-my-bookings {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 1.4rem;
      padding: 0.6rem 1rem;
      width: 100%;
      color: #7a8aaa;
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      cursor: pointer;
      margin-top: 0.8rem;
      transition: border-color 0.15s;
    }
    .btn-my-bookings:hover { border-color: #00e5b0; color: #00e5b0; }

    /* modal */
    .booking-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 500px;
      background: #0a0f1a;
      border-radius: 20px;
      border: 1px solid #00e5b0;
      z-index: 1001;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 1.2rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(0, 0, 0, 0.3);
      border-radius: 20px 20px 0 0;
    }
    .modal-header h3 { color: #00e5b0; margin: 0; }
    .modal-close {
      background: none;
      border: none;
      color: #7a8aaa;
      font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-close:hover { color: #ff5e6c; }
    .bookings-list-modal { padding: 1rem; overflow-y: auto; flex: 1; max-height: 60vh; }
    .booking-card-modal {
      background: rgba(20, 25, 40, 0.8);
      border-radius: 12px;
      padding: 0.8rem 1rem;
      margin-bottom: 0.8rem;
      border-left: 3px solid;
    }
    .booking-time { font-weight: bold; font-size: 0.9rem; color: #eef2ff; }
    .booking-date, .booking-room { font-size: 0.7rem; color: #7a8aaa; margin: 0.2rem 0; }
    .booking-status { font-size: 0.7rem; font-weight: bold; margin: 0.3rem 0; }
    .booking-id { font-size: 0.7rem; color: #00e5b0; font-family: monospace; margin-top: 0.3rem; }
    .modal-footer {
      padding: 0.8rem 1rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 0 0 20px 20px;
    }
    .btn-refresh, .btn-close-modal {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 0.4rem 0.8rem;
      color: #eef2ff;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      cursor: pointer;
    }
    .btn-refresh:hover, .btn-close-modal:hover {
      background: rgba(0, 229, 176, 0.15);
      border-color: #00e5b0;
      color: #00e5b0;
    }

    @media (max-width: 780px) {
      body { padding: 1rem; }
      .app-container { padding: 1.2rem; border-radius: 1.5rem; }
      .slots-grid { grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); }
      .title-section h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div id="toast"></div>
<div class="global-overlay" id="globalOverlay"></div>

<div class="app-container">
  <div class="system-header">
    <div class="title-section">
      <h1>LEO MARQUARD</h1>
      <p>UCT LAUNDRY BOOKING SYSTEM</p>
    </div>
    <div class="status-badge"><span class="status-dot"></span>SYSTEM ONLINE</div>
  </div>

  <div class="booking-panel">
    <div class="form-section">
      <div class="glass-card">
        <div class="card-label">🔐 Identification</div>

        <div class="input-field">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="John Doe" autocomplete="off">
        </div>
        <div class="input-field">
          <label>UCT Email</label>
          <input type="email" id="email" placeholder="ABCXYZ001@myuct.ac.za" autocomplete="off">
        </div>
        <div class="input-field">
          <label>Room Number</label>
          <input type="text" id="roomNumber" placeholder="100A">
        </div>

        <div class="dropdown-field">
          <div class="dropdown-label">🏭 Facility Type</div>
          <div class="dropdown-trigger" id="facilityTrigger">
            <span id="facilitySelectedText">Select facility</span>
            <span class="dropdown-arrow">▾</span>
          </div>
        </div>

        <div class="dropdown-field">
          <div class="dropdown-label">🚪 Laundry Room</div>
          <div class="dropdown-trigger" id="roomTrigger" data-locked="true">
            <span id="roomSelectedText">— First choose facility —</span>
            <span class="dropdown-arrow">▾</span>
          </div>
        </div>

        <div class="selection-card">
          <div class="selection-header">
            <span>📋 YOUR SELECTION</span>
            <span class="selection-reset" id="resetSelectionBtn">✕ Clear</span>
          </div>
          <div class="selection-content" id="selectionContent">
            <div class="selection-empty"><span class="empty-icon">👆</span><p>Select facility & room above</p></div>
          </div>
        </div>

        <button class="btn-my-bookings" id="myBookingsBtn">📋 View My Bookings</button>
      </div>
    </div>

    <div class="slots-section">
      <div class="glass-card">
        <div class="slot-header">
          <div class="slot-header-title">⚡ Available Time Slots</div>
          <div class="date-input-wrap">
            <input type="date" id="slotDate">
          </div>
        </div>
        <div id="slotsContainer" class="slots-grid">
          <div class="empty-state">Select facility & room to view slots</div>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot avail"></div>Available</div>
          <div class="legend-item"><div class="legend-dot taken"></div>Booked</div>
          <div class="legend-item"><div class="legend-dot sel"></div>Selected</div>
        </div>
        <button class="btn-book" id="bookButton" disabled>CONFIRM BOOKING</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
