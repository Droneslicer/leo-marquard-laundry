<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leo Marquard Laundry</title>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script defer src="{{ url_for('static', filename='app.js') }}"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1014;
      --panel: #111922;
      --panel-2: #172230;
      --line: #263442;
      --text: #edf4f7;
      --muted: #91a3ad;
      --gold: #d6ad5b;
      --teal: #5fd0bd;
      --danger: #ff6b6b;
      --ok: #7bd88f;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, Segoe UI, system-ui, sans-serif;
      background: radial-gradient(circle at top left, rgba(214,173,91,.12), transparent 32rem), var(--bg);
      color: var(--text);
    }
    header, main { width: min(1120px, calc(100% - 32px)); margin: 0 auto; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: center; padding: 28px 0 18px; }
    h1 { margin: 0; font-size: clamp(28px, 5vw, 48px); letter-spacing: 0; }
    .subtitle { color: var(--muted); margin-top: 6px; }
    .grid { display: grid; grid-template-columns: 1.1fr .9fr; gap: 18px; align-items: start; padding-bottom: 34px; }
    .panel, dialog { background: rgba(17,25,34,.94); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 18px 70px rgba(0,0,0,.24); }
    .panel { padding: 22px; }
    .stack { display: grid; gap: 14px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    label { display: grid; gap: 7px; color: var(--muted); font-size: 13px; }
    input, select, button, textarea {
      font: inherit;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #0d141c;
      color: var(--text);
      min-height: 44px;
      padding: 0 12px;
    }
    button { cursor: pointer; font-weight: 700; }
    button.primary { background: var(--gold); border-color: var(--gold); color: #191307; }
    button.secondary { background: var(--panel-2); }
    button:disabled { cursor: wait; opacity: .64; }
    .slots { display: grid; grid-template-columns: repeat(auto-fit, minmax(132px, 1fr)); gap: 10px; }
    .slot {
      min-height: 48px;
      background: #0d141c;
      color: var(--text);
      border: 1px solid var(--line);
    }
    .slot.active { border-color: var(--gold); box-shadow: inset 0 0 0 1px var(--gold); }
    .slot.taken, .slot.closed { color: #64747e; text-decoration: line-through; cursor: not-allowed; }
    .notice { min-height: 24px; color: var(--muted); }
    .notice.error { color: var(--danger); }
    .notice.ok { color: var(--ok); }
    .meta { display: grid; gap: 10px; color: var(--muted); line-height: 1.55; }
    .machine-list { display: grid; gap: 10px; margin-top: 14px; }
    .machine { display: flex; justify-content: space-between; gap: 10px; padding: 12px; background: #0d141c; border: 1px solid var(--line); border-radius: 8px; }
    .pill { color: #081412; background: var(--teal); border-radius: 999px; padding: 3px 9px; font-size: 12px; font-weight: 800; white-space: nowrap; }
    .pill.off { background: var(--danger); color: #210707; }
    dialog { width: min(760px, calc(100% - 28px)); color: var(--text); padding: 0; }
    dialog::backdrop { background: rgba(0,0,0,.72); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px; border-bottom: 1px solid var(--line); }
    .modal-body { padding: 18px; display: grid; gap: 12px; }
    .booking { padding: 14px; background: #0d141c; border: 1px solid var(--line); border-radius: 8px; }
    @media (max-width: 820px) {
      header, .grid, .row { display: grid; grid-template-columns: 1fr; }
    }
  </style>
</head>
<body data-page="student">
  <header>
    <div>
      <h1>Leo Marquard Laundry</h1>
      <div class="subtitle">Same-day laundry bookings for UCT residents.</div>
    </div>
    <button class="secondary" id="openMyBookings">My Bookings</button>
  </header>

  <main class="grid">
    <section class="panel stack">
      <h2>Book a Slot</h2>
      <div class="row">
        <label>Facility
          <select id="facilitySelect"></select>
        </label>
        <label>Laundry Room
          <select id="roomSelect"></select>
        </label>
      </div>
      <label>Time Slot
        <div class="slots" id="slotGrid"></div>
      </label>
      <div class="row">
        <label>Name
          <input id="nameInput" autocomplete="name" placeholder="Full name">
        </label>
        <label>UCT Email
          <input id="emailInput" type="email" autocomplete="email" placeholder="student@myuct.ac.za">
        </label>
      </div>
      <label>Residence Room Number
        <input id="roomNumberInput" placeholder="Example: 814">
      </label>
      <button class="primary" id="bookButton">Confirm Booking</button>
      <div class="notice" id="bookingNotice"></div>
    </section>

    <aside class="panel">
      <h2>Machine Status</h2>
      <div class="meta">
        <div>Bookings open at 06:00 and are only available for today.</div>
        <div>Use your @myuct.ac.za email. One booking per person per day.</div>
        <div>Reception may release abandoned slots after the 15-minute grace period.</div>
      </div>
      <div class="machine-list" id="studentMachines"></div>
    </aside>
  </main>

  <dialog id="myBookingsModal">
    <div class="modal-head">
      <strong>My Bookings</strong>
      <button class="secondary" id="closeMyBookings">Close</button>
    </div>
    <div class="modal-body">
      <label>UCT Email
        <input id="myBookingsEmail" type="email" placeholder="student@myuct.ac.za">
      </label>
      <button class="primary" id="loadMyBookings">Load Bookings</button>
      <div id="myBookingsList" class="stack"></div>
    </div>
  </dialog>
</body>
</html>
